services:
  jellyfin:
    image: lscr.io/linuxserver/jellyfin:latest
    container_name: chome_jellyfin
    restart: unless-stopped
    runtime: nvidia
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Moscow
      - JELLYFIN_PublishedServerUrl=http://192.168.1.10
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=all
    volumes:
      - /mnt/data/projects/chome/volumes/jellyfin/library:/config
      - /mnt/data/storage/tvseries:/data/tvshows
      - /mnt/data/storage/movies:/data/movies
      - /mnt/data/storage/music:/data/music
      - /mnt/data/storage/photos:/data/photos
    ports:
      - 28096:8096
      - 28920:8920
      - 7359:7359/udp
      - 1900:1900/udp
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
