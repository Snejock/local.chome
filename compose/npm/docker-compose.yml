services:
  npm:
    image: 'jlesage/nginx-proxy-manager:latest'
    container_name: chome_npm
    restart: unless-stopped
    ports:
      - '80:8080'
      - '443:4443'
      - '81:8181'
    networks:
      - chome-net
    volumes:
      - /mnt/data/projects/chome/volumes/npm/data:/data:rw
      - /mnt/data/projects/chome/volumes/npm/letsencrypt:/etc/letsencrypt:rw
