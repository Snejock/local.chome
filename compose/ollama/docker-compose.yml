services:
  ollama:
    image: docker.io/ollama/ollama:latest
    ports: ['11434:11434']
    container_name: chome_ollama
    tty: true
    restart: unless-stopped
    environment:
      - OLLAMA_KEEP_ALIVE=24h
    networks:
      - chome-net
    volumes:
      - /mnt/data/projects/chome/volumes/ollama:/root/.ollama
